<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF-8">
    <title>Modifica Libro</title>
  </head>

  <body>
    <h1>Modifica Libro</h1>

    <p><a href = "index.html">Torna al Catalogo</a></p>

    <form id = "form-modifica">
      <input type = "hidden" id = "libro-id">
      <label>Titolo Libro:<input type = "text" id = "titolo" required></label><br />
      <label>Anno Pubblicazione: <input type = "number" id = "anno" required></label><br />
      <label>Autore <br /><select id = "autore-id" required></select></label><br />
      <label>Genere <br /><select id = "genere-id" required></select></label><br /><br />
      <button type = "submit">Aggiorna</button>
    </form>

    <script>
      const API = 'http://localhost/Progetto-Biblioteca/server/index.php';
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');

      async function carica_select() {
        try {
          let response = await fetch(`${API}/libri`);
          let json = await response.json();
          const selectAutore = document.getElementById("autore-id");
          const selectGenere = document.getElementById("genere-id");
          selectAutore.innerHTML = '<option value = "">Seleziona Autore</option>';
          selectGenere.innerHTML = '<option value = "">Seleziona Genere</option>';
          json.data.forEach(libro => {
            selectAutore.innerHTML += `<option value = "${libro.idAutore}">${libro.nomeAutore}</option>`;
            selectGenere.innerHTML += `<option value = "${libro.idGenere}">${libro.nomeGenere}</option>`;
          });
        } catch (error) {
            alert('Errore: ' + error.message);
        }
      }

      async function carica_libro() {
        if (!id) {
          alert('ID Canzone non Specificato');
          return;
        }
        try {
          const response = await fetch(`${API}/libri/${id}`);
          const json = await response.json();
          if (!json.success) {
            alert('Libro non Trovato');
            return;
          }
          const libro = json.data;
          document.getElementById('titolo').value = libro.titoloLibro;
          document.getElementById('anno').value = libro.annoPubbl;
          await carica_select();
          document.getElementById('autore-id').value = libro.idAutore;
          document.getElementById('genere-id').value = libro.idGenere;
        } catch (error) {
          alert('Errore: ' + error.message);
        }
      }

      
      document.getElementById("form-modifica").addEventListener('submit', async (event) => {
        event.preventDefault();
        const dati = {
          titoloLibro: document.getElementById("titolo").value,
          annoPubbl: document.getElementById("anno").value,
          idAutore: document.getElementById("autore-id").value,
          idGenere: document.getElementById("genere-id").value
        };
        try {
          const response = await fetch(`${API}/libri/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dati)
          });
          if (response.ok) {
            alert('Libro Aggiornata!');
            location.href = 'index.html';
          } else {
            const error = await response.json();
            alert('Errore: ' + (error.message || 'Aggiornamento Fallito'));
          }
        } catch (error) {
            alert('Errore: ' + error.message);
        }
      });

      carica_libro();
    </script>
  </body>
</html>
